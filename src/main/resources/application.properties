# Server Configuration
# If $PORT is missing (like on your local machine), it falls back to 8089.
server.port=${PORT:8089}

# PostgreSQL Database Configuration
# Credentials and URLs are securely injected by the cloud environment.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/translator_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:system}

# JPA/Hibernate Framework Control
# WARNING: 'update' is dangerous in a production cloud environment.
# The cloud should ideally pass DB_DDL_AUTO=validate or none.
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Multipart file configuration to handle large audio payloads
# Made configurable in case the cloud environment has stricter limits.
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}