# Server port (Render sets PORT automatically)
server.port=${PORT:8080}

# Database (values from Render environment)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# HikariCP connection pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000

# File upload
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:20MB}

# Force simple HTTP client (avoids missing class error on Render)
spring.http.client.factory=simple

# Vosk models (set by Dockerfile)
vosk.model.dir=/opt/vosk-models

# Translation fallback & caching
translation.fallback-order=google,libretranslate,mymemory
translation.cache.name=translationCache
translation.cache.ttl-minutes=10
translation.cache.max-size=2000
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=2000,expireAfterWrite=10m

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# Logging
logging.level.root=WARN
logging.level.com.translator=INFO

# DevTools disabled in production
spring.devtools.restart.enabled=false