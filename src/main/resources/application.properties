server.port=${PORT:8089}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:false}
# Force UTC timezone at the JDBC level
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:20MB}

spring.jpa.open-in-view=false

# HikariCP connection pool tuning
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Cycles connections every 10 minutes (must be shorter than the database's timeout)
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000