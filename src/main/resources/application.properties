# ==============================================================
# SERVER CONFIGURATION
# ==============================================================
server.port=${PORT:8089}

# ==============================================================
# DATABASE CONFIGURATION (Zero-Setup Fallback Strategy)
# ==============================================================
# ==============================================================
# DATABASE CONFIGURATION - FORCED POSTGRESQL
# ==============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/translator_db}
spring.datasource.driverClassName=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:system}

# JPA / Hibernate
# Uses 'update' locally to build tables automatically, but allows override in prod
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# HikariCP connection pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000

# ==============================================================
# APPLICATION SETTINGS
# ==============================================================
# File upload limits
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:20MB}

# Force simple HTTP client (avoids missing class error in strict environments)
spring.http.client.factory=simple

# Vosk models path
# Locally points to your resources folder, in Docker points to /opt/vosk-models
vosk.model.dir=${VOSK_MODEL_DIR:src/main/resources/vosk-model}

# Translation fallback & caching
translation.fallback-order=google,libretranslate,mymemory
translation.cache.name=translationCache
translation.cache.ttl-minutes=10
translation.cache.max-size=2000
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=2000,expireAfterWrite=10m

# JWT Authentication
# Uses a hardcoded default for local testing, expects injected secret in Prod
jwt.secret=${JWT_SECRET:this_is_a_local_development_secret_key_that_must_be_long_enough}
jwt.expiration-ms=86400000

# ==============================================================
# LOGGING & DEVTOOLS
# ==============================================================
logging.level.root=WARN
logging.level.com.translator=INFO

# DevTools disabled in production automatically
spring.devtools.restart.enabled=${DEVTOOLS_ENABLED:true}

