<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Translator - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans">

<div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-gray-200 relative overflow-hidden">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Welcome</h1>
        <p id="subtitle" class="text-gray-500 text-sm">Sign in to your account</p>
    </div>

    <div id="notification" class="hidden mb-4 p-3 rounded text-sm text-center font-semibold"></div>

    <form id="loginForm" action="/login" method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
            <input type="text" name="username" required class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
            <input type="password" name="password" required class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition duration-300 shadow-md">
            Login
        </button>
        <p class="text-center text-sm text-gray-500 mt-4">
            Don't have an account? <button type="button" onclick="toggleView('register')" class="text-blue-600 font-bold hover:underline">Sign up</button>
        </p>
    </form>

    <form id="registerForm" class="space-y-4 hidden" onsubmit="handleRegister(event)">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Choose a Username</label>
            <input type="text" id="regUsername" required class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-green-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Create a Password</label>
            <input type="password" id="regPassword" required class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-green-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-xl transition duration-300 shadow-md">
            Create Account
        </button>
        <p class="text-center text-sm text-gray-500 mt-4">
            Already have an account? <button type="button" onclick="toggleView('login')" class="text-blue-600 font-bold hover:underline">Log in</button>
        </p>
    </form>

</div>

<script>
    // 1. Logic to visually swap between Login and Register views
    function toggleView(view) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const subtitle = document.getElementById('subtitle');
        const notification = document.getElementById('notification');

        notification.classList.add('hidden'); // Clear notifications on swap

        if (view === 'register') {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            subtitle.innerText = "Create a new account";
        } else {
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            subtitle.innerText = "Sign in to your account";
        }
    }

    // 2. Logic to handle the Registration API call
    async function handleRegister(event) {
        event.preventDefault(); // Stop the page from reloading

        const user = document.getElementById('regUsername').value;
        const pass = document.getElementById('regPassword').value;
        const notification = document.getElementById('notification');

        // Package the data exactly how our AuthController expects it
        const formData = new URLSearchParams();
        formData.append('username', user);
        formData.append('password', pass);

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                body: formData
            });

            const resultText = await response.text();

            notification.classList.remove('hidden');
            if (response.ok) {
                // Success! Show green message and switch back to login screen
                notification.className = "mb-4 p-3 rounded text-sm text-center font-semibold bg-green-100 text-green-700";
                notification.innerText = "Success! You can now log in.";
                document.getElementById('regUsername').value = "";
                document.getElementById('regPassword').value = "";
                toggleView('login');
                notification.classList.remove('hidden'); // keep message visible after toggle
            } else {
                // Failed (e.g., username taken). Show red error.
                notification.className = "mb-4 p-3 rounded text-sm text-center font-semibold bg-red-100 text-red-700";
                notification.innerText = resultText;
            }
        } catch (error) {
            alert("An error occurred communicating with the server.");
        }
    }

    // 3. Check if Spring Security redirected us here with an error
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            const notification = document.getElementById('notification');
            notification.className = "mb-4 p-3 rounded text-sm text-center font-semibold bg-red-100 text-red-700";
            notification.innerText = "Invalid username or password.";
            notification.classList.remove('hidden');
        }
    }
</script>
</body>
</html>
