<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Translator - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans">

<div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-gray-200 relative overflow-hidden">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Welcome To Gray United Voice Translator🎙️🌐</h1>
        <p id="subtitle" class="text-gray-500 text-sm">Sign in to your account</p>
    </div>

    <div id="notification" class="hidden mb-4 p-3 rounded text-sm text-center font-semibold"></div>

    <form id="loginForm" action="/login" method="POST" class="space-y-4" onsubmit="handlePreLogin(event)">
        <!-- CSRF token will be filled by JavaScript -->
        <input type="hidden" id="csrfToken" name="_csrf" value="" />
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
            <input type="text" id="loginUsername" name="username" required class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <div class="flex justify-between items-center mb-1">
                <label class="block text-sm font-semibold text-gray-700">Password</label>
                <button type="button" onclick="toggleView('forgot')" class="text-xs text-blue-600 font-bold hover:underline">Forgot?</button>
            </div>
            <div class="relative">
                <input type="password" id="loginPassword" name="password" required class="w-full border border-gray-300 rounded-lg p-3 pr-10 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
                <button type="button" onclick="toggleVisibility('loginPassword', 'eye-login')" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500 hover:text-gray-700 focus:outline-none">
                    <svg id="eye-login" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                    </svg>
                </button>
            </div>
        </div>
        <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-md">
            Login
        </button>
        <p class="text-center text-sm text-gray-500 mt-4">
            Don't have an account? <button type="button" onclick="toggleView('register')" class="text-blue-600 font-bold hover:underline">Sign up</button>
        </p>
    </form>

    <form id="registerForm" class="space-y-4 hidden" onsubmit="handleRegister(event)">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Choose a Username</label>
            <input type="text" id="regUsername" required class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-green-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Create a Password</label>
            <div class="relative">
                <input type="password" id="regPassword" required class="w-full border border-gray-300 rounded-lg p-3 pr-10 bg-gray-50 focus:ring-2 focus:ring-green-500 outline-none">
                <button type="button" onclick="toggleVisibility('regPassword', 'eye-reg')" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500 hover:text-gray-700 focus:outline-none">
                    <svg id="eye-reg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>
                </button>
            </div>
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Security Question</label>
            <select id="regQuestion" class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                <option value="What city were you born in?">What city were you born in?</option>
                <option value="What is your favorite food?">What is your favorite food?</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Your Answer</label>
            <div class="relative">
                <input type="password" id="regAnswer" required class="w-full border border-gray-300 rounded-lg p-3 pr-10 bg-gray-50 focus:ring-2 focus:ring-green-500 outline-none">
                <button type="button" onclick="toggleVisibility('regAnswer', 'eye-reg-ans')" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500 hover:text-gray-700 focus:outline-none">
                    <svg id="eye-reg-ans" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>
                </button>
            </div>
        </div>
        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-md">
            Create Account
        </button>
        <p class="text-center text-sm text-gray-500 mt-4">
            Already have an account? <button type="button" onclick="toggleView('login')" class="text-blue-600 font-bold hover:underline">Log in</button>
        </p>
    </form>

    <form id="forgotForm" class="space-y-4 hidden" onsubmit="handleReset(event)">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Your Username</label>
            <input type="text" id="resetUsername" required class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-purple-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Answer to Security Question</label>
            <div class="relative">
                <input type="password" id="resetAnswer" required class="w-full border border-gray-300 rounded-lg p-3 pr-10 bg-gray-50 focus:ring-2 focus:ring-purple-500 outline-none">
                <button type="button" onclick="toggleVisibility('resetAnswer', 'eye-res-ans')" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500 hover:text-gray-700 focus:outline-none">
                    <svg id="eye-res-ans" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>
                </button>
            </div>
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Enter New Password</label>
            <div class="relative">
                <input type="password" id="resetNewPassword" required class="w-full border border-gray-300 rounded-lg p-3 pr-10 bg-gray-50 focus:ring-2 focus:ring-purple-500 outline-none">
                <button type="button" onclick="toggleVisibility('resetNewPassword', 'eye-res-new')" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500 hover:text-gray-700 focus:outline-none">
                    <svg id="eye-res-new" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>
                </button>
            </div>
        </div>
        <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-md">
            Reset Password
        </button>
        <p class="text-center text-sm text-gray-500 mt-4">
            Remembered it? <button type="button" onclick="toggleView('login')" class="text-blue-600 font-bold hover:underline">Go back to login</button>
        </p>
    </form>

</div>

<script>
    // --- View Toggle Logic ---
    function toggleView(view) {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('forgotForm').classList.add('hidden');
        document.getElementById('notification').classList.add('hidden');

        const subtitle = document.getElementById('subtitle');

        if (view === 'register') {
            document.getElementById('registerForm').classList.remove('hidden');
            subtitle.innerText = "Create a new account";
        } else if (view === 'forgot') {
            document.getElementById('forgotForm').classList.remove('hidden');
            subtitle.innerText = "Recover your account";
        } else {
            document.getElementById('loginForm').classList.remove('hidden');
            subtitle.innerText = "Sign in to your account";
        }
    }

    // --- Eye Button Logic ---
    function toggleVisibility(fieldId, iconId) {
        const field = document.getElementById(fieldId);
        const icon = document.getElementById(iconId);

        if (field.type === 'password') {
            field.type = 'text';
            icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
        } else {
            field.type = 'password';
            icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`;
        }
    }

    // --- CSRF Token Helper (reads from cookie) ---
    function getCsrfTokenFromCookie() {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            const [name, value] = cookie.trim().split('=');
            if (name === 'XSRF-TOKEN') {
                return decodeURIComponent(value);
            }
        }
        return null;
    }

    // --- Pre-Login Check Logic ---
    async function handlePreLogin(event) {
        event.preventDefault(); // Stop standard form submission temporarily
        const form = event.target;
        const username = document.getElementById('loginUsername').value;
        const notification = document.getElementById('notification');
        const loginBtn = document.getElementById('loginBtn');

        loginBtn.disabled = true;
        loginBtn.innerText = "Checking...";

        // Inject CSRF token into the hidden input before any submission attempt
        const csrfToken = getCsrfTokenFromCookie();
        if (csrfToken) {
            document.getElementById('csrfToken').value = csrfToken;
        }

        try {
            const checkRes = await fetch(`/api/auth/check-user?username=${encodeURIComponent(username)}`);
            const checkData = await checkRes.json();

            if (!checkData.exists) {
                notification.className = "mb-4 p-3 rounded text-sm text-center font-semibold bg-red-100 text-red-700";
                notification.innerText = "User does not exist. Please create an account first.";
                notification.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.innerText = "Login";
                return; // Halt login process
            }

            // User exists, submit the form (CSRF token is now set)
            loginBtn.innerText = "Authenticating...";
            form.submit();

        } catch (error) {
            notification.className = "mb-4 p-3 rounded text-sm text-center font-semibold bg-red-100 text-red-700";
            notification.innerText = "An error occurred connecting to the server.";
            notification.classList.remove('hidden');
            loginBtn.disabled = false;
            loginBtn.innerText = "Login";
        }
    }

    // --- Registration Logic ---
    async function handleRegister(event) {
        event.preventDefault();

        const formData = new URLSearchParams();
        formData.append('username', document.getElementById('regUsername').value);
        formData.append('password', document.getElementById('regPassword').value);
        formData.append('securityQuestion', document.getElementById('regQuestion').value);
        formData.append('securityAnswer', document.getElementById('regAnswer').value);

        try {
            const response = await fetch('/api/auth/register', { method: 'POST', body: formData });
            const resultText = await response.text();

            const notification = document.getElementById('notification');
            notification.classList.remove('hidden');

            if (response.ok) {
                notification.className = "mb-4 p-3 rounded text-sm text-center font-semibold bg-green-100 text-green-700";
                notification.innerText = "Success! You can now log in.";
                event.target.reset();
                toggleView('login');
                notification.classList.remove('hidden');
            } else {
                notification.className = "mb-4 p-3 rounded text-sm text-center font-semibold bg-red-100 text-red-700";
                notification.innerText = resultText;
            }
        } catch (error) {
            alert("An error occurred communicating with the server.");
        }
    }

    // --- Reset Logic ---
    async function handleReset(event) {
        event.preventDefault();

        const formData = new URLSearchParams();
        formData.append('username', document.getElementById('resetUsername').value);
        formData.append('securityAnswer', document.getElementById('resetAnswer').value);
        formData.append('newPassword', document.getElementById('resetNewPassword').value);

        try {
            const response = await fetch('/api/auth/reset', { method: 'POST', body: formData });
            const resultText = await response.text();

            const notification = document.getElementById('notification');
            notification.classList.remove('hidden');

            if (response.ok) {
                notification.className = "mb-4 p-3 rounded text-sm text-center font-semibold bg-green-100 text-green-700";
                notification.innerText = resultText;
                event.target.reset();
                toggleView('login');
                notification.classList.remove('hidden');
            } else {
                notification.className = "mb-4 p-3 rounded text-sm text-center font-semibold bg-red-100 text-red-700";
                notification.innerText = resultText;
            }
        } catch (error) {
            alert("An error occurred communicating with the server.");
        }
    }

    // --- Error Handling for Redirects ---
    window.onload = function() {
        if (new URLSearchParams(window.location.search).has('error')) {
            const notification = document.getElementById('notification');
            notification.className = "mb-4 p-3 rounded text-sm text-center font-semibold bg-red-100 text-red-700";
            notification.innerText = "Invalid username or password.";
            notification.classList.remove('hidden');
        }
    }
</script>
</body>
</html>
