<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gray United Speech Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/RecordRTC/5.6.2/RecordRTC.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 flex flex-col items-center justify-start min-h-screen py-12 px-4 antialiased text-slate-800">

<div class="glass-panel p-10 rounded-3xl shadow-[0_20px_50px_rgba(8,_112,_184,_0.07)] max-w-4xl w-full relative overflow-hidden">

    <div class="absolute -top-24 -right-24 w-48 h-48 bg-gradient-to-br from-indigo-500 to-blue-400 rounded-full mix-blend-multiply filter blur-2xl opacity-20"></div>

    <div class="flex justify-between items-center mb-8 relative z-10">
        <div>
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-600 to-orange-500 tracking-tight mb-1">Gray United Voice Translator</h1>
            <p class="text-slate-500 font-medium">Offline speech processing.</p>
        </div>
        <a href="/logout" class="text-sm text-slate-600 font-semibold px-5 py-2.5 bg-slate-100 rounded-xl hover:bg-slate-200 hover:text-red-800 transition-all duration-200 ease-in-out shadow-sm border border-slate-200">Sign Out</a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 relative z-10">

        <div>
            <label class="block text-xs font-bold text-slate-800 uppercase tracking-wider mb-2">You Speak (Source)</label>
            <div class="relative">
                <select id="sourceLang" class="w-full appearance-none border border-slate-200 rounded-xl p-4 bg-white text-slate-700 font-medium focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none cursor-pointer">
                    <option value="en-IN" selected>Indian English (en-IN)</option>
                    <option value="en-US">American English (en-US)</option>
                    <option value="hi-IN">Hindi (hi-IN)</option>
                    <option value="te-IN">Telugu (te-IN)</option> </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                    <svg class="fill-current h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                </div>
            </div>
        </div>

        <div>
            <label class="block text-xs font-bold text-slate-800 uppercase tracking-wider mb-2">Translates To (Target)</label>
            <div class="relative">
                <select id="targetLang" class="w-full appearance-none border border-slate-200 rounded-xl p-4 bg-white text-slate-700 font-medium focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none cursor-pointer">
                    <optgroup label="Indian Languages">
                        <option value="hi">Hindi</option>
                        <option value="or">Odia</option>
                        <option value="bn">Bengali</option>
                        <option value="pa">Punjabi</option>
                        <option value="gu">Gujarati</option>
                        <option value="mr">Marathi</option>
                        <option value="ta">Tamil</option>
                        <option value="te">Telugu</option>
                        <option value="kn">Kannada</option>
                        <option value="ml">Malayalam</option>

                    </optgroup>
                    <optgroup label="International Languages">
                        <option value="en">English</option>
                        <option value="fr">French</option>
                        <option value="ru">Russian</option>
                        <option value="de">German</option>
                        <option value="es">Spanish</option>
                        <option value="zh">Chinese</option>
                    </optgroup>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                    <svg class="fill-current h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <button id="recordBtn" class="group relative w-full bg-gradient-to-r from-indigo-600 to-blue-500 hover:from-indigo-600 hover:to-blue-700 text-white font-bold py-5 px-6 rounded-2xl transition-all duration-300 shadow-lg hover:shadow-indigo-500/30 transform hover:-translate-y-0.5 flex justify-center items-center gap-3 z-10">
        <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
        </svg>
        <span id="btnText" class="text-lg tracking-wide">Start Recording</span>
    </button>

    <div id="status" class="text-center mt-4 hidden z-10 relative">
        <div class="inline-flex items-center gap-2 bg-red-50 text-red-600 px-4 py-1.5 rounded-full text-sm font-semibold border border-red-100">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                </span>
            Recording audio stream...
        </div>
    </div>

    <div class="mt-10 pt-8 border-t border-slate-100 relative z-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                <h3 class="text-xs font-bold text-slate-600 uppercase tracking-wider mb-3">Transcription (Source)</h3>
                <p id="originalText" class="text-slate-600 text-base leading-relaxed min-h-[3rem] font-medium">-</p>
            </div>

            <div class="bg-indigo-50/50 rounded-2xl p-6 border border-indigo-100 relative">
                <div class="flex justify-between items-start mb-3">
                    <h3 class="text-xs font-bold text-indigo-400 uppercase tracking-wider">Translation Result</h3>

                    <button id="playBtn" class="hidden text-indigo-600 hover:text-indigo-800 transition-colors p-2 -mt-2 -mr-2 rounded-full hover:bg-indigo-100 focus:outline-none focus:ring-2 focus:ring-indigo-400" title="Read Aloud">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                </div>
                <p id="translatedText" class="text-indigo-900 text-xl font-bold leading-relaxed min-h-[3rem]">-</p>
            </div>
        </div>
    </div>
</div>

<div class="glass-panel max-w-4xl w-full mt-8 p-10 rounded-3xl shadow-[0_20px_50px_rgba(8,_112,_184,_0.07)]">
    <div class="flex items-center justify-between mb-8">
        <h2 class="text-2xl font-extrabold text-slate-800 flex items-center gap-3">
            <div class="p-2 bg-indigo-100 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            Translation History
        </h2>
    </div>

    <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
        <table class="w-full text-sm text-left">
            <thead class="text-xs text-slate-800 uppercase tracking-wider bg-slate-50 border-b border-slate-200">
            <tr>
                <th scope="col" class="px-6 py-5 font-bold w-5/12">Source Text</th>
                <th scope="col" class="px-6 py-5 font-bold w-5/12">Translated Text</th>
                <th scope="col" class="px-6 py-5 font-bold w-2/12 text-center">Route</th>
            </tr>
            </thead>
            <tbody id="historyTableBody" class="divide-y divide-slate-100">
            <tr>
                <td colspan="3" class="px-6 py-8 text-center text-slate-400 font-medium">Fetching secure records...</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let recorder;
    let microphone;
    const recordBtn = document.getElementById('recordBtn');
    const statusEl = document.getElementById('status');
    const btnText = document.getElementById('btnText');
    const playBtn = document.getElementById('playBtn');
    const micIcon = document.getElementById('micIcon');

    // --- 1. History Loading Logic ---
    async function loadHistory() {
        const tableBody = document.getElementById('historyTableBody');

        try {
            const response = await fetch('/api/history');
            if (!response.ok) throw new Error("Failed to load history");

            const historyData = await response.json();
            tableBody.innerHTML = '';

            if (historyData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-slate-400 font-medium bg-slate-50/50">No translation records found in the database.</td></tr>`;
                return;
            }

            historyData.forEach(record => {
                const row = document.createElement('tr');
                row.className = "bg-white hover:bg-indigo-50/30 transition-colors duration-150";
                row.innerHTML = `
                    <td class="px-6 py-5 font-medium text-slate-700 leading-relaxed border-r border-slate-50">"${record.originalText}"</td>
                    <td class="px-6 py-5 text-indigo-700 font-bold leading-relaxed border-r border-slate-50">${record.translatedText}</td>
                    <td class="px-6 py-5 text-center">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-bold bg-slate-100 text-slate-600 uppercase tracking-wider">
                            ${record.sourceLanguage} → ${record.targetLanguage}
                        </span>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        } catch (error) {
            console.error("History Error:", error);
            tableBody.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-red-500 font-medium bg-red-50/50">Connection error. Could not retrieve history.</td></tr>`;
        }
    }

    window.addEventListener('DOMContentLoaded', loadHistory);

// --- 2. Text-to-Speech Logic (Upgraded for Native Pronunciation) ---
    playBtn.addEventListener('click', () => {
        const textToRead = document.getElementById('translatedText').innerText;
        const selectedLang = document.getElementById('targetLang').value; // e.g., 'bn'

        const voiceMap = {
            'hi': 'hi-IN', 'es': 'es-ES', 'fr': 'fr-FR', 'or': 'or-IN',
            'bn': 'bn-IN', 'zh': 'zh-CN', 'de': 'de-DE', 'ru': 'ru-RU',
            'en': 'en-US', 'te': 'te-IN', 'mr': 'mr-IN', 'ta': 'ta-IN'
        };

        const targetLangCode = voiceMap[selectedLang] || 'en-US';
        const utterance = new SpeechSynthesisUtterance(textToRead);

        utterance.lang = targetLangCode;
        utterance.rate = 0.9;

        // 1. Get all installed voices on the user's computer/browser
        const voices = window.speechSynthesis.getVoices();

        // 2. Force the browser to find a voice that matches the selected language (e.g., 'bn')
        const nativeVoice = voices.find(voice => voice.lang.toLowerCase().startsWith(selectedLang.toLowerCase()));

        // 3. If a native voice exists, attach it to the utterance
        if (nativeVoice) {
            utterance.voice = nativeVoice;
        } else {
            console.warn(`No native voice installed for ${targetLangCode}. Falling back to default.`);
            // Optional: You could add a UI alert here telling the user to install the language pack
        }

        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    });

    // Pro-tip: Browsers load voices asynchronously. This line forces them to load immediately.
    window.speechSynthesis.onvoiceschanged = function() {
        window.speechSynthesis.getVoices();
    };

    // --- 3. Recording & Translation Logic ---
    recordBtn.addEventListener('click', async () => {

        // STOP RECORDING
        if (recorder && recorder.getState() === "recording") {
            recorder.stopRecording(async () => {

                const audioBlob = recorder.getBlob();
                microphone.getTracks().forEach(track => track.stop());

                // UI Reset
                btnText.innerText = "Start Recording";
                recordBtn.className = "group relative w-full bg-gradient-to-r from-indigo-600 to-blue-500 hover:from-indigo-700 hover:to-blue-600 text-white font-bold py-5 px-6 rounded-2xl transition-all duration-300 shadow-lg hover:shadow-indigo-500/30 transform hover:-translate-y-0.5 flex justify-center items-center gap-3 z-10";
                micIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />`;
                statusEl.classList.add('hidden');
                playBtn.classList.add('hidden');

                document.getElementById('originalText').innerText = "Processing audio stream...";
                document.getElementById('translatedText').innerText = "Translating...";

                // PREPARE DATA FOR BACKEND
                const formData = new FormData();
                formData.append("audio", audioBlob, "recording.wav");
                formData.append("sourceLang", document.getElementById("sourceLang").value);
                formData.append("targetLang", document.getElementById("targetLang").value);

                try {
                    const response = await fetch('/api/translate', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error("Translation failed");

                    const data = await response.json();
                    document.getElementById('originalText').innerText = `"${data.original}"`;
                    document.getElementById('translatedText').innerText = data.translated;

                    playBtn.classList.remove('hidden');
                    loadHistory();

                } catch (error) {
                    console.error("Error:", error);
                    document.getElementById('originalText').innerText = "Error connecting to server.";
                    document.getElementById('translatedText').innerText = "Please try again.";
                }
            });
            return;
        }

        // START RECORDING
        try {
            microphone = await navigator.mediaDevices.getUserMedia({ audio: true });

            recorder = new RecordRTC(microphone, {
                type: 'audio',
                mimeType: 'audio/wav',
                recorderType: RecordRTC.StereoAudioRecorder,
                desiredSampRate: 16000,
                numberOfAudioChannels: 1
            });

            recorder.startRecording();

            // UI Update for Recording State
            btnText.innerText = "Stop Recording";
            recordBtn.className = "group relative w-full bg-gradient-to-r from-rose-500 to-red-600 hover:from-rose-600 hover:to-red-700 text-white font-bold py-5 px-6 rounded-2xl transition-all duration-300 shadow-lg hover:shadow-red-500/30 transform hover:-translate-y-0.5 flex justify-center items-center gap-3 z-10 animate-pulse";
            micIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />`;
            statusEl.classList.remove('hidden');
            playBtn.classList.add('hidden');

        } catch (err) {
            alert("Microphone access denied or not found. Please check your browser permissions.");
        }
    });
</script>
</body>
</html>
