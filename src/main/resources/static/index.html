<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gray United Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/RecordRTC/5.6.2/RecordRTC.min.js"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-start min-h-screen font-sans py-12 px-4">

<div class="bg-white p-8 rounded-2xl shadow-xl max-w-4xl w-full border border-gray-200">

    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Language Translator</h1>
            <p class="text-gray-500 text-sm">Speak in English, translate instantly.</p>
        </div>
        <a href="/logout" class="text-sm text-red-500 font-bold px-4 py-2 bg-red-50 rounded-lg hover:bg-red-100 transition">Logout</a>
    </div>

    <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Choose Language</label>
        <select id="targetLang" class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 text-gray-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
            <option value="hi">Hindi</option>
            <option value="or">Odia</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
        </select>
    </div>

    <button id="recordBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition duration-300 shadow-md flex justify-center items-center gap-2">
        <span id="btnText">Start Recording</span>
    </button>

    <div id="status" class="text-center text-sm text-red-500 font-medium mt-3 animate-pulse hidden">
        Recording in progress...
    </div>

    <div class="mt-8 pt-6 border-t border-gray-200">
        <div class="mb-4">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">You Said:</h3>
            <p id="originalText" class="text-gray-800 text-base min-h-[1.5rem] italic">-</p>
        </div>

        <div>
            <div class="flex justify-between items-center mb-1">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Translation:</h3>

                <button id="playBtn" class="hidden text-blue-600 hover:text-blue-800 transition p-2 rounded-full hover:bg-blue-50" title="Read Aloud">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    </svg>
                </button>
            </div>
            <p id="translatedText" class="text-blue-600 text-xl font-bold min-h-[1.5rem]">-</p>
        </div>
    </div>
</div>

<div class="max-w-4xl w-full mt-8 bg-white p-8 rounded-2xl shadow-xl border border-gray-200">
    <h2 class="text-2xl font-extrabold text-gray-900 mb-6 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Translation History
    </h2>

    <div class="overflow-x-auto rounded-lg border border-gray-200">
        <table class="w-full text-sm text-left text-gray-500">
            <thead class="text-xs text-gray-700 uppercase bg-gray-50">
            <tr>
                <th scope="col" class="px-6 py-4 font-bold w-1/3">Original</th>
                <th scope="col" class="px-6 py-4 font-bold w-1/2">Translation</th>
                <th scope="col" class="px-6 py-4 font-bold w-1/6">Target</th>
            </tr>
            </thead>
            <tbody id="historyTableBody">
            <tr>
                <td colspan="3" class="px-6 py-4 text-center text-gray-400 italic">Loading history...</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let recorder;
    let microphone;
    const recordBtn = document.getElementById('recordBtn');
    const statusEl = document.getElementById('status');
    const btnText = document.getElementById('btnText');
    const playBtn = document.getElementById('playBtn');

    // --- 1. History Loading Logic ---
    async function loadHistory() {
        const tableBody = document.getElementById('historyTableBody');

        try {
            const response = await fetch('/api/history');
            if (!response.ok) throw new Error("Failed to load history");

            const historyData = await response.json();
            tableBody.innerHTML = ''; // Clear loading message

            if (historyData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="3" class="px-6 py-4 text-center text-gray-400 italic">No translations yet.</td></tr>`;
                return;
            }

            historyData.forEach(record => {
                const row = document.createElement('tr');
                row.className = "bg-white border-b hover:bg-gray-50 transition";
                row.innerHTML = `
                    <td class="px-6 py-4 font-medium text-gray-900 leading-relaxed">"${record.originalText}"</td>
                    <td class="px-6 py-4 text-blue-600 font-bold leading-relaxed">${record.translatedText}</td>
                    <td class="px-6 py-4 uppercase text-xs font-semibold tracking-wider text-gray-500">${record.targetLanguage}</td>
                `;
                tableBody.appendChild(row);
            });
        } catch (error) {
            console.error("History Error:", error);
            tableBody.innerHTML = `<tr><td colspan="3" class="px-6 py-4 text-center text-red-500 font-medium">Could not load history.</td></tr>`;
        }
    }

    // Load history instantly when the page opens
    window.addEventListener('DOMContentLoaded', loadHistory);


    // --- 2. Text-to-Speech Logic ---
    playBtn.addEventListener('click', () => {
        const textToRead = document.getElementById('translatedText').innerText;
        const selectedLang = document.getElementById('targetLang').value;

        const voiceMap = {
            'hi': 'hi-IN',
            'es': 'es-ES',
            'fr': 'fr-FR',
            'or': 'or-IN'
        };

        const utterance = new SpeechSynthesisUtterance(textToRead);
        utterance.lang = voiceMap[selectedLang] || 'en-US';
        utterance.rate = 0.9;

        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    });


    // --- 3. Recording & Translation Logic ---
    recordBtn.addEventListener('click', async () => {

        // STOP RECORDING
        if (recorder && recorder.getState() === "recording") {
            recorder.stopRecording(async () => {

                const audioBlob = recorder.getBlob();
                microphone.getTracks().forEach(track => track.stop());

                btnText.innerText = "Start Recording";
                recordBtn.classList.replace('bg-red-600', 'bg-blue-600');
                statusEl.classList.add('hidden');
                playBtn.classList.add('hidden');

                document.getElementById('originalText').innerText = "Processing audio...";
                document.getElementById('translatedText').innerText = "Translating...";

                const formData = new FormData();
                formData.append("audio", audioBlob, "recording.wav");
                formData.append("targetLang", document.getElementById("targetLang").value);

                try {
                    const response = await fetch('/api/translate', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error("Translation failed");

                    const data = await response.json();
                    document.getElementById('originalText').innerText = `"${data.original}"`;
                    document.getElementById('translatedText').innerText = data.translated;

                    playBtn.classList.remove('hidden');

                    // Refresh history table with the newly processed translation
                    loadHistory();

                } catch (error) {
                    console.error("Error:", error);
                    document.getElementById('originalText').innerText = "Error connecting to server.";
                    document.getElementById('translatedText').innerText = "Please try again.";
                }
            });
            return;
        }

        // START RECORDING
        try {
            microphone = await navigator.mediaDevices.getUserMedia({ audio: true });

            recorder = new RecordRTC(microphone, {
                type: 'audio',
                mimeType: 'audio/wav',
                recorderType: RecordRTC.StereoAudioRecorder,
                desiredSampRate: 16000,
                numberOfAudioChannels: 1
            });

            recorder.startRecording();

            btnText.innerText = "Stop Recording";
            recordBtn.classList.replace('bg-blue-600', 'bg-red-600');
            statusEl.classList.remove('hidden');
            playBtn.classList.add('hidden');

        } catch (err) {
            alert("Microphone access denied or not found.");
        }
    });
</script>
</body>
</html>
